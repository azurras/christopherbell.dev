spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  profiles:
    default: local
logging:
  level:
    root: INFO
    org.springframework: INFO
    dev.christopherbell: INFO
posts:
  expiration:
    enabled: false
    cleanup-interval: 600000
vehicles:
  nhtsa-vin:
    enabled: true
    url: https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVINValuesBatch
    fixed-delay: 3600000
    connect-timeout: 10s
    request-timeout: 20s
    cooldown: 24h
    batch-size: 50
    max-batch-size: 50
    state-id: nhtsa
    state-note: VIN enrichment data sourced from NHTSA vPIC
  random-vin:
    enabled: false
    url: https://randomvin.com/getvin.php?type=real
    fixed-delay: 1000 #600000
    robots-url: https://randomvin.com/robots.txt
    path: /getvin.php
    user-agent: vinner
    connect-timeout: 10s
    request-timeout: 15s
    cooldown: 24h
    max-calls-per-day: 50000
    robots-fail-closed: true
    state-id: randomvin
    state-note: VIN data sourced from randomvin.com
    legacy-import-note: Imported from randomvin.com
  vin-decoder:
    rate-limit-capacity: 20
    rate-limit-window: 1m
wfl:
  restaurant-of-the-day:
    enabled: true
    cron: "0 0 0 * * *"
    zone: America/Chicago
    pick-count: 3
    austin-metro-cities: Austin,Round Rock,Cedar Park,Georgetown,Pflugerville,Leander,Hutto,Manor,Buda,Kyle,Bee Cave,Lakeway,Dripping Springs,Bastrop,San Marcos
  restaurant-import:
    osm:
      endpoint: https://overpass-api.de/api/interpreter
      # South,west,north,east around the Austin metro.
      bbox: 29.95,-98.25,30.75,-97.15
      timeout-seconds: 60
      result-limit: 5000
      include-fast-food: true
reports:
  to: report@christopherbell.dev
blog-properties:
  posts:
    - author: "Test"
      contentText: "Test Content"
      date: 10-1-2022
      description: "test description"
      id: "021e2435-7259-4b48-99a0-e4ce43f3948f"
      imagePath: N/A
      tags:
        - testTag
        - testTag2
      title: test blog
