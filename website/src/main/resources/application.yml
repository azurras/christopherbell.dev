vehicles:
  nhtsa-vin:
    enabled: true
    url: https://vpic.nhtsa.dot.gov/api/vehicles/DecodeVINValuesBatch
    fixed-delay: 3600000
    connect-timeout: 10s
    request-timeout: 20s
    cooldown: 24h
    batch-size: 50
    max-batch-size: 50
    state-id: nhtsa
    state-note: VIN enrichment data sourced from NHTSA vPIC
  random-vin:
    enabled: false
    url: https://randomvin.com/getvin.php?type=real
    fixed-delay: 1000 #600000
    robots-url: https://randomvin.com/robots.txt
    path: /getvin.php
    user-agent: vinner
    connect-timeout: 10s
    request-timeout: 15s
    cooldown: 24h
    max-calls-per-day: 50000
    robots-fail-closed: true
    state-id: randomvin
    state-note: VIN data sourced from randomvin.com
    legacy-import-note: Imported from randomvin.com
  vin-decoder:
    rate-limit-capacity: 20
    rate-limit-window: 1m
wfl:
  restaurant-of-the-day:
    enabled: true
    cron: "0 0 0 * * *"
    zone: America/Chicago
    pick-count: 3
    supported-metro-cities: Austin,Round Rock,Cedar Park,Georgetown,Pflugerville,Leander,Hutto,Manor,Buda,Kyle,Bee Cave,Lakeway,Dripping Springs,Bastrop,San Marcos,San Francisco,Oakland,Berkeley,San Jose,San Mateo,Palo Alto,Mountain View,Sunnyvale,Santa Clara,Fremont,Hayward,Richmond,Walnut Creek,Redwood City,Daly City,New Orleans,Metairie,Kenner,Gretna,Harvey,Westwego,Chalmette,Slidell,Dallas,Irving,Garland,Richardson,Plano,Mesquite,Carrollton,Grand Prairie,Addison
  restaurant-import:
    monthly:
      enabled: true
      cron: "0 0 3 15 * *"
      zone: America/Chicago
    osm:
      endpoint: https://overpass-api.de/api/interpreter
      # Semicolon-separated south,west,north,east boxes for Austin, SF Bay Area, New Orleans, and Dallas.
      bbox: 29.95,-98.25,30.75,-97.15;37.20,-122.65,38.20,-121.65;29.70,-90.45,30.25,-89.65;32.45,-97.35,33.15,-96.35
      timeout-seconds: 60
      result-limit: 20000
      include-fast-food: true
