<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Back Office</title>
  <link rel="stylesheet" type="text/css" href="/css/main.css"/>
  <link rel="shortcut icon" href="/images/headers/logo.png"/>
</head>
<body class="back-office">
  <div id="nav"></div>
  <main class="container-fluid py-4 d-none" id="backOfficeContent" role="main">
    <div class="row">
      <div class="col-12">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
          <div>
            <h1 class="display-6 mb-1">Back Office</h1>
            <p class="text-muted mb-0">Admin-only workspace.</p>
          </div>
          <span class="badge text-bg-dark">ADMIN</span>
        </div>
        <div id="backOfficeAlert" class="alert alert-danger d-none" role="alert"></div>
        <ul class="nav nav-pills back-office-nav mb-3" id="backOfficeTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="tab-reports" data-bs-toggle="pill" data-bs-target="#panel-reports" type="button" role="tab">Reports</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab-users" data-bs-toggle="pill" data-bs-target="#panel-users" type="button" role="tab">Users</button>
          </li>
        </ul>
        <div class="tab-content">
          <div class="tab-pane fade show active" id="panel-reports" role="tabpanel">
            <div class="card">
              <div class="card-body">
                <div class="table-responsive">
                  <table class="table table-sm align-middle mb-0 table-striped" id="backOfficeReports">
                    <thead>
                      <tr>
                        <th>Created</th>
                        <th>Reason</th>
                        <th>Reporter</th>
                        <th>Reported</th>
                        <th>Post</th>
                        <th>Status</th>
                        <th>Resolution</th>
                        <th>Resolved On</th>
                        <th>Action</th>
                      </tr>
                    </thead>
                    <tbody></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
          <div class="tab-pane fade" id="panel-users" role="tabpanel">
            <div class="card">
              <div class="card-body">
                <div class="table-responsive">
                  <table class="table table-sm align-middle mb-0 table-striped" id="backOfficeTable">
                    <thead>
                      <tr>
                        <th>Username</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Approved</th>
                        <th>Created</th>
                        <th>Last Login</th>
                        <th>Updated</th>
                        <th>ID</th>
                        <th>Type</th>
                        <th>Approved By</th>
                        <th>Created By</th>
                        <th>Last Modified By</th>
                      </tr>
                    </thead>
                    <tbody></tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <footer id="footer"></footer>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/back-office.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
