<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <th:block th:replace="~{fragments/social-preview :: socialPreview('CB | Notifications', 'Your latest Void signals on christopherbell.dev.', 'https://www.christopherbell.dev/notifications', 'https://www.christopherbell.dev/images/previews/christopherbell-dev.png', 'The Void preview for christopherbell.dev')}"></th:block>
  <title>Notifications</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="/css/main.css"/>
</head>
<body class="site-page void-shell-page notifications-page">
  <div id="nav"></div>
  <main class="site-main void-notifications-page" role="main">
    <section class="void-messages-shell" aria-labelledby="notificationsTitle">
      <div class="void-messages-container">
        <header class="void-messages-header">
          <div>
            <p class="thread-label">Signal log</p>
            <h1 id="notificationsTitle">Notifications</h1>
            <p>Mentions, likes, comments, messages, and lunch invites from the Void.</p>
          </div>
          <span class="thread-status-pill is-live">Live while open</span>
        </header>

        <div id="notificationsAlert" class="alert alert-danger d-none" role="alert"></div>

        <section class="notification-settings" aria-labelledby="notificationSettingsTitle">
          <div class="messages-panel-header">
            <div>
              <p class="profile-label">Signal controls</p>
              <h2 id="notificationSettingsTitle">Notification settings</h2>
            </div>
          </div>
          <div id="notificationSettingsForm" class="notification-settings-form"></div>
          <p id="notificationSettingsStatus" class="notification-settings-status" aria-live="polite"></p>
        </section>

        <section id="notificationsPage" class="notifications-center-panel" aria-label="Notifications">
          <div class="messages-panel-header">
            <div>
              <p class="profile-label">Recent signals</p>
              <h2>All notifications</h2>
            </div>
          </div>
          <div id="notificationsList" class="notifications-center-list">
            <div class="feed-empty-state notifications-empty-state">
              <h2>Loading signals</h2>
              <p>Checking the latest activity for your account.</p>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>
  <footer id="footer"></footer>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/notifications.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
