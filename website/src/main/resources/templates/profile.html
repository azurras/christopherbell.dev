<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <th:block th:replace="~{fragments/social-preview :: socialPreview('CB | Profile', 'Your christopherbell.dev profile and Void posts.', 'https://www.christopherbell.dev/profile', 'https://www.christopherbell.dev/images/previews/christopherbell-dev.png', 'The Void preview for christopherbell.dev')}"></th:block>
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="/css/main.css"/>
</head>
<body class="site-page void-shell-page profile-page">
  <div id="nav"></div>
  <main class="site-main" role="main">
    <section class="site-hero site-hero-profile" aria-labelledby="profileTitle">
      <div class="container">
        <p class="home-kicker">Account</p>
        <h1 id="profileTitle">Profile</h1>
        <p id="profileHeroMeta">Your details and the posts you have put into the feed.</p>
      </div>
    </section>
    <section class="site-content">
      <div class="container">
        <div id="profileAlert" class="alert alert-danger d-none mb-3" role="alert"></div>
        <div class="profile-shell">
          <aside class="profile-overview" aria-label="Account summary">
            <div class="profile-card">
              <div class="profile-avatar-lg" id="profileAvatar" aria-hidden="true">?</div>
              <div class="profile-identity">
                <p class="profile-label">Signed in as</p>
                <h2 id="profileHandle">@user</h2>
                <p id="profileName">Name unavailable</p>
              </div>
              <div class="profile-chip-row" aria-label="Account state">
                <span class="profile-chip" id="profileRole">Role</span>
                <span class="profile-chip profile-chip-status" id="profileStatus">Status</span>
              </div>
              <dl class="profile-detail-grid" id="accountDetails">
                <div>
                  <dt>Username</dt>
                  <dd data-field="username">-</dd>
                </div>
                <div>
                  <dt>Email</dt>
                  <dd data-field="email">-</dd>
                </div>
                <div>
                  <dt>Name</dt>
                  <dd data-field="name">-</dd>
                </div>
                <div>
                  <dt>Role</dt>
                  <dd data-field="role">-</dd>
                </div>
                <div>
                  <dt>Status</dt>
                  <dd data-field="status">-</dd>
                </div>
              </dl>
            </div>
            <div class="profile-stat-grid" aria-label="Profile activity">
              <div class="profile-stat">
                <span id="profilePostCount">0</span>
                <small>Posts</small>
              </div>
              <div class="profile-stat">
                <span id="profileReplyCount">0</span>
                <small>Replies</small>
              </div>
              <div class="profile-stat">
                <span id="profileLikeCount">0</span>
                <small>Likes</small>
              </div>
            </div>
          </aside>
          <div class="profile-posts-panel">
            <div class="profile-posts-header">
              <div>
                <p class="profile-label">Personal feed</p>
                <h2>My Posts</h2>
              </div>
              <a class="btn btn-dark btn-sm" href="/void">New post</a>
            </div>
            <div id="postsList" class="feed-list profile-feed-list"></div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer id="footer"></footer>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/profile.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
