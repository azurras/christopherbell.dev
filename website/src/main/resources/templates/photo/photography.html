<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Christopher Bell" />
    <meta name="keywords" content="cbell,photography" />
    <th:block th:replace="~{fragments/social-preview :: socialPreview('CB | Photography', 'Photography from Christopher Bell.', 'https://www.christopherbell.dev/photos', 'https://www.christopherbell.dev/images/previews/christopherbell-dev.png', 'The Void preview for christopherbell.dev')}"></th:block>

    <title>CB | Photography</title>

    <link rel="stylesheet" type="text/css" href="/css/main.css"/>

<body class="site-page photo-page">
    <div id="nav"></div>
    <main class="site-main">
        <section class="site-hero site-hero-photo" aria-labelledby="photoTitle">
