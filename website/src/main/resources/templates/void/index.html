<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Christopher Bell" />
    <meta name="keywords" content="cbell,void" />
    <th:block th:replace="~{fragments/social-preview :: socialPreview('CB | Void', 'Short posts, quick replies, and the latest noise from the feed.', 'https://www.christopherbell.dev/void', 'https://www.christopherbell.dev/images/previews/christopherbell-dev.png', 'The Void preview for christopherbell.dev')}"></th:block>
    <title>CB | Void</title>

    <link rel="stylesheet" type="text/css" href="/css/main.css"/>
</head>

<body class="site-page void-shell-page void-page">
    <div id="nav"></div>
    <main class="site-main" role="main">
        <section class="site-hero site-hero-void" aria-labelledby="voidTitle">
            <div class="container">
                <p class="home-kicker">Live Feed</p>
                <h1 id="voidTitle">Void</h1>
                <p>Short posts, quick replies, and the latest noise from the feed.</p>
            </div>
        </section>
        <section class="site-content">
            <div class="container">
                <div id="composer" class="feed-shell">
                    <div id="homeAlert" class="alert alert-danger d-none" role="alert"></div>
                    <div class="card shadow-sm feed-composer-card">
                        <div class="card-body">
                            <div class="feed-composer-heading">
                                <div>
                                    <p class="home-kicker mb-1">Broadcast</p>
                                    <h2>Share something</h2>
                                </div>
                                <small id="charCount" class="composer-count">0 / 280</small>
                            </div>
                            <textarea id="postText" class="form-control feed-composer-input" rows="4" placeholder="Drop a thought into the Void. Mention people with @username."></textarea>
                            <div id="composerPreview" class="composer-preview-shell" aria-live="polite"></div>
                            <div class="feed-composer-actions">
                                <span class="composer-hint">Cmd/Ctrl + Enter posts</span>
                                <button id="postBtn" class="btn btn-dark">Post</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="composerPrompt" class="feed-shell d-none">
                    <div class="card shadow-sm">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h2 class="h5 mb-1">Join the conversation</h2>
                                <p class="mb-0 text-muted">Sign in or create an account to post.</p>
                            </div>
                            <div class="d-flex gap-2">
                                <a href="/login?redirect=/void" class="btn btn-primary">Sign in</a>
                                <a href="/signup" class="btn btn-outline-secondary">Sign up</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="feed" class="feed-shell">
                    <div class="feed-toolbar" aria-label="Feed controls">
                        <div class="feed-segment" role="tablist" aria-label="Feed filter">
                            <button class="feed-filter active" type="button" data-filter="all">All</button>
                            <button class="feed-filter" type="button" data-filter="following">Following</button>
                        </div>
                        <label class="feed-sort-label">
                            <span>Sort</span>
                            <select id="feedSort" class="form-select form-select-sm">
                                <option value="newest">Newest</option>
                                <option value="active">Active</option>
                                <option value="expiring">Expiring Soon</option>
                            </select>
                        </label>
                    </div>
                    <div id="newPostsBanner" class="feed-new-banner d-none" role="alert">
                        <span>New posts are available</span>
                        <button id="showNewPostsBtn" class="btn btn-sm btn-light">Show</button>
                    </div>
                    <div id="feedList" class="feed-list"></div>
                </div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>
</body>

<script type="module" src="/js/app.js"></script>
<script type="module" src="/js/home-feed.js"></script>

</html>
