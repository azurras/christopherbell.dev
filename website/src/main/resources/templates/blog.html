<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="author" content="Christopher Bell" />
    <meta name="keywords" content="cbell,blog" />
    <th:block th:replace="~{fragments/social-preview :: socialPreview('CB | Blog', 'Longer thoughts, project notes, and old-school blog energy from christopherbell.dev.', 'https://www.christopherbell.dev/blog', 'https://www.christopherbell.dev/images/previews/christopherbell-dev.png', 'The Void preview for christopherbell.dev')}"></th:block>

    <title>CB | Blog</title>

    <link rel="stylesheet" type="text/css" href="/css/main.css"/>
</head>

<body class="site-page blog-page">
    <div id="nav"></div>
    <main class="site-main" role="main">
        <section class="site-hero site-hero-blog" aria-labelledby="blogTitle">
            <div class="container">
                <p class="home-kicker">Notes</p>
                <h1 id="blogTitle">Blog</h1>
                <p>Longer thoughts, project notes, and old-school blog energy.</p>
            </div>
        </section>
        <section class="site-content">
            <div class="container">
                <div class="content-panel">
                    <div id="blog"></div>
                </div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>

</body>

<script type="module" src="/js/app.js"> </script>

</html>
