<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:fragment="socialPreview(title, description, url, image, imageAlt)">
    <meta name="description" th:content="${description}" />
    <link rel="canonical" th:href="${url}" />

    <meta property="og:site_name" content="christopherbell.dev" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:title" th:content="${title}" />
    <meta property="og:description" th:content="${description}" />
    <meta property="og:url" th:content="${url}" />
    <meta property="og:image" th:content="${image}" />
    <meta property="og:image:secure_url" th:content="${image}" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" th:content="${imageAlt}" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" th:content="${title}" />
    <meta name="twitter:description" th:content="${description}" />
    <meta name="twitter:image" th:content="${image}" />
    <meta name="twitter:image:alt" th:content="${imageAlt}" />
    <meta name="theme-color" content="#17202a" />
  </th:block>
</head>
</html>
