<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <th:block th:replace="~{fragments/social-preview :: socialPreview('CB | Reset Password', 'Set a new password for your christopherbell.dev account.', 'https://www.christopherbell.dev/reset-password', 'https://www.christopherbell.dev/images/previews/christopherbell-dev.png', 'The Void preview for christopherbell.dev')}"></th:block>
  <title>Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="/css/main.css"/>
</head>
<body class="site-page auth-page">
  <div id="nav"></div>
  <main class="auth-shell" role="main">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="auth-heading">
          <p class="home-kicker">Account access</p>
          <h1>Set new password</h1>
          <p>Choose a new password for your account.</p>
        </div>
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <div id="resetPasswordAlert" class="alert d-none" role="alert"></div>
            <form id="resetPasswordForm" novalidate>
              <div class="mb-3">
                <label for="password" class="form-label">New password</label>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required />
              </div>
              <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm password</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required />
              </div>
              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Reset password</button>
                <a class="btn btn-outline-secondary" href="/login">Back to login</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
  <footer id="footer"></footer>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/auth/reset-password.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
