<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="/css/main.css"/>
</head>
<body class="site-page user-page">
  <div id="nav"></div>
  <main class="site-main" role="main">
    <section class="site-hero site-hero-user" aria-label="User profile">
      <div class="container">
        <p class="home-kicker">Profile</p>
        <h1 id="userHeroTitle">User Feed</h1>
        <p id="userHeroMeta">Posts from one corner of the Void.</p>
      </div>
    </section>
    <section class="site-content">
      <div class="container">
        <div id="userAlert" class="alert alert-danger d-none mb-3" role="alert"></div>
        <div class="user-profile-shell">
          <aside class="profile-overview" aria-label="User summary">
            <div class="profile-card user-profile-card">
              <div id="userAvatar" class="profile-avatar-lg" aria-hidden="true">
                <span id="userInitials">?</span>
              </div>
              <div class="profile-identity">
                <p class="profile-label">Account</p>
                <h2 id="userHandle">@user</h2>
                <p id="userMeta">Loading profile...</p>
              </div>
              <button id="followBtn" class="btn btn-dark d-none" type="button">Follow</button>
            </div>
            <div class="profile-stat-grid" aria-label="User network">
              <div class="profile-stat">
                <span id="userPostCount">0</span>
                <small>Posts shown</small>
              </div>
              <div class="profile-stat">
                <span id="userFollowerCount">0</span>
                <small>Followers</small>
              </div>
              <div class="profile-stat">
                <span id="userFollowingCount">0</span>
                <small>Following</small>
              </div>
            </div>
          </aside>
          <div class="profile-posts-panel">
            <div class="profile-posts-header">
              <div>
                <p class="profile-label">Public feed</p>
                <h2>Posts</h2>
              </div>
              <a class="btn btn-outline-dark btn-sm" href="/void">Back to feed</a>
            </div>
            <div id="userFeed" class="feed-list user-feed-list"></div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer id="footer"></footer>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/user-feed.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
