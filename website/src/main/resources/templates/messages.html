<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <th:block th:replace="~{fragments/social-preview :: socialPreview('CB | Messages', 'Private Void conversations on christopherbell.dev.', 'https://www.christopherbell.dev/messages', 'https://www.christopherbell.dev/images/previews/christopherbell-dev.png', 'The Void preview for christopherbell.dev')}"></th:block>
  <title>Messages</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="/css/main.css"/>
</head>
<body class="site-page messages-page">
  <div id="nav"></div>
  <main class="site-main" role="main">
    <section class="site-hero site-hero-messages" aria-labelledby="messagesTitle">
      <div class="container">
        <p class="home-kicker">Direct Messages</p>
        <h1 id="messagesTitle">Messages</h1>
        <p>Private conversations with people in the Void.</p>
      </div>
    </section>
    <section class="site-content">
      <div class="container">
        <div id="messagesAlert" class="alert alert-danger d-none mb-3" role="alert"></div>
        <div class="messages-shell">
          <aside class="messages-sidebar" aria-label="Conversations">
            <div class="messages-panel">
              <div class="messages-panel-header">
                <div>
                  <p class="profile-label">Inbox</p>
                  <h2>Conversations</h2>
                </div>
              </div>
              <form id="newConversationForm" class="message-new-form">
                <label class="form-label" for="recipientUsername">Message someone</label>
                <div class="input-group">
                  <span class="input-group-text">@</span>
                  <input id="recipientUsername" class="form-control" autocomplete="off" placeholder="username" />
                  <button class="btn btn-dark" type="submit">Open</button>
                </div>
              </form>
              <div id="conversationList" class="conversation-list"></div>
            </div>
          </aside>
          <section class="messages-panel messages-thread-panel" aria-labelledby="conversationTitle">
            <div class="messages-panel-header">
              <div>
                <p class="profile-label">Conversation</p>
                <h2 id="conversationTitle">Pick a conversation</h2>
              </div>
              <a id="conversationProfileLink" class="btn btn-outline-dark btn-sm d-none" href="/void">View profile</a>
            </div>
            <div id="messageList" class="message-list">
              <div class="feed-empty-state message-empty-state">
                <h2>No conversation selected</h2>
                <p>Open a conversation or start one with a username.</p>
              </div>
            </div>
            <form id="messageForm" class="message-form d-none">
              <textarea id="messageText" class="form-control" rows="3" maxlength="1000" placeholder="Write a private message..."></textarea>
              <div class="message-form-actions">
                <span id="messageCount" class="composer-count">0 / 1000</span>
                <button id="sendMessageBtn" class="btn btn-dark" type="submit">Send</button>
              </div>
            </form>
          </section>
        </div>
      </div>
    </section>
  </main>
  <footer id="footer"></footer>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/messages.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
