<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <th:block th:replace="~{fragments/social-preview :: socialPreview('CB | Void Post', 'A Void post thread with context, replies, and the rest of the conversation.', ${socialUrl}, 'https://www.christopherbell.dev/images/previews/christopherbell-dev.png', 'The Void preview for christopherbell.dev')}"></th:block>
  <title>Post</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css" href="/css/main.css"/>
</head>
<body class="site-page post-page">
  <div id="nav"></div>
  <main class="site-main" role="main">
    <section class="site-hero site-hero-post" aria-label="Post thread">
      <div class="container">
        <p class="home-kicker">Thread</p>
        <h1 id="postHeroTitle">Post</h1>
        <p id="postHeroMeta">Context, replies, and the rest of the conversation.</p>
      </div>
    </section>
    <section class="site-content">
      <div class="container">
        <div id="postAlert" class="alert alert-danger d-none" role="alert"></div>
        <div class="thread-layout">
          <div class="thread-main">
            <section id="rootPost" class="thread-root-panel" aria-label="Selected post">
              <div class="thread-panel-header">
                <div>
                  <p class="thread-label">Selected post</p>
                  <h2>Thread focus</h2>
                </div>
                <a class="btn btn-outline-dark btn-sm" href="/void">Back to feed</a>
              </div>
              <div class="thread-root-body"></div>
            </section>
            <div id="replyComposer" class="thread-composer-panel d-none">
              <h2>Reply</h2>
              <textarea id="replyText" class="form-control" rows="3" maxlength="280" placeholder="Write a reply..."></textarea>
              <div class="d-flex justify-content-end mt-2">
                <button id="replyBtn" class="btn btn-dark">Reply</button>
              </div>
            </div>
            <section class="thread-replies-panel" aria-labelledby="threadRepliesTitle">
              <div class="thread-panel-header">
                <div>
                  <p class="thread-label">Conversation</p>
                  <h2 id="threadRepliesTitle">Replies</h2>
                </div>
                <span class="thread-count-pill" id="threadReplyPill">0 replies</span>
              </div>
              <div id="threadList" class="feed-list thread-feed-list"></div>
            </section>
          </div>
          <aside class="thread-side" aria-label="Thread summary">
            <div class="thread-summary-card">
              <p class="thread-label">Thread stats</p>
              <dl>
                <div>
                  <dt>Author</dt>
                  <dd id="threadAuthor">-</dd>
                </div>
                <div>
                  <dt>Posted</dt>
                  <dd id="threadCreated">-</dd>
                </div>
                <div>
                  <dt>Replies</dt>
                  <dd id="threadReplyCount">0</dd>
                </div>
                <div>
                  <dt>Likes</dt>
                  <dd id="threadLikeCount">0</dd>
                </div>
                <div>
                  <dt>Status</dt>
                  <dd><span class="thread-status-pill" id="threadStatus">Live</span></dd>
                </div>
              </dl>
              <a class="thread-jump-link" href="#threadRepliesTitle">Jump to replies</a>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>
  <footer id="footer"></footer>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/post.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
